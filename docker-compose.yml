services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: loanpro
      POSTGRES_PASSWORD: loanpro
      POSTGRES_DB: loanpro
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loanpro -d loanpro"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://loanpro:loanpro@db:5432/loanpro?schema=public"
    ports:
      - "3005:3000"
    restart: unless-stopped

volumes:
  db_data:
